name: Pull Request Labeler
description: 'Automatically label pull requests based on changed files'

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Label content changes
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = [];

            // Get changed files
            const response = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            const files = response.data.map(f => f.filename);

            // Determine labels based on files changed
            if (files.some(f => f.startsWith('content/writing/'))) {
              labels.push('writing');
            }
            if (files.some(f => f.startsWith('content/gallery/'))) {
              labels.push('gallery');
            }
            if (files.some(f => f.startsWith('layouts/') || f.startsWith('assets/'))) {
              labels.push('design');
            }
            if (files.some(f => f === 'hugo.toml' || f.endsWith('.yml'))) {
              labels.push('config');
            }
            if (files.some(f => f.includes('.md') && !f.startsWith('content/'))) {
              labels.push('documentation');
            }
            if (files.some(f => f.startsWith('.github/') || f.includes('workflow'))) {
              labels.push('ci');
            }

            // Add labels if any were identified
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels,
              });
            }
