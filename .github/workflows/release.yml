name: 🚀 Release Workflow
description: 'Create and manage release versions'

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2026.1.0)'
        required: true

jobs:
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag or input
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build changelog
        id: changelog
        run: |
          # Generate changelog from commit messages
          CHANGELOG=$(git log --pretty=format:"%h - %s (%an)" $(git describe --tags --abbrev=0 HEAD^)..HEAD 2>/dev/null || echo "Initial release")
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🎉 eim.ie v${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.changelog }}

            ### 🔗 Links
            - 🌐 [Visit Site](https://eim.ie)
            - 📖 [GitHub](https://github.com/eimi-codes/eim.ie)
          draft: false
          prerelease: false
