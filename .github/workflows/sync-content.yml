name: Sync Content Branches
description: 'Keep content-related branches synchronized'

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'archetypes/**'
  workflow_dispatch:

jobs:
  sync:
    name: Sync to Content Branch
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync content to develop branch
        run: |
          # Create or checkout develop branch
          git fetch origin develop 2>/dev/null || git branch develop
          git checkout develop

          # Merge main into develop (content updates)
          git merge main -m "chore: sync content from main"

          # Push back to origin
          git push origin develop
        continue-on-error: true
