{{ define "main" }}
<section class="section-block stack">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}{{ . }}{{ end }}
</section>

{{ if .RegularPages }}
<section class="section-block stack" aria-label="Liosta ábhair / Content list">
  <div class="grid cols-2">
    {{ range .RegularPages.ByDate.Reverse }}
      {{ partial "components/card.html" . }}
    {{ end }}
  </div>
</section>
{{ end }}
{{ end }}
